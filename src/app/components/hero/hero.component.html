<section
  class="relative min-h-screen flex flex-col justify-center items-center bg-gradient-to-r from-gray-900 via-gray-800 to-gray-700 text-white px-6 overflow-hidden"
   appScrollAnimate
  [speed]="0.15"
  [darkColor]="'rgba(20,20,20,1)'"
  [rotateAxis]="'X'"
  [maxRotation]="10"
  [smoothFactor]="0.2"
>
  <!-- Background animated shapes -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden">
    <!-- Circle -->
    <span class="absolute w-72 h-72 bg-gray-600 rounded-full opacity-20 animate-float-slow -top-24 -left-24"></span>

    <!-- Blob / polygon -->
    <span class="absolute w-80 h-80 bg-gray-500 opacity-15 blob animate-float-slow top-1/4 left-3/4"></span>

    <!-- Square -->
    <span class="absolute w-48 h-48 bg-gray-400 opacity-15 rounded-lg animate-float-slow -bottom-24 -right-24"></span>

    <!-- Triangle (using clip-path) -->
    <span class="absolute w-40 h-40 bg-gray-500 opacity-10 animate-float-slow top-1/2 left-1/4"
      style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></span>

    <!-- Horizontal line -->
    <span class="absolute w-80 h-px bg-gray-600 opacity-10 animate-float-slow bottom-1/3 left-1/2"></span>
  </div>

  <!-- Hero content -->
  <h1 class="text-5xl md:text-6xl font-extrabold mb-6">
    JD De Jesus
  </h1>

  <p class="text-xl md:text-2xl text-gray-300 mb-12 flex justify-center items-center gap-2">
    Full Stack Web Developer
    <span class="text-teal-300 font-semibold typing inline-block border-r-2 border-gray-300"></span>
  </p>

  <!-- Buttons -->
  <div class="flex flex-wrap justify-center gap-4">
    <a href="https://github.com/JeydiDJ" target="_blank"
       class="group flex items-center gap-2 bg-gray-700 text-gray-300 rounded-full px-6 py-3 shadow-lg hover:bg-gray-900 hover:text-white transition transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-400">
      GitHub
    </a>

    <a href="https://linkedin.com/in/john-dave-de-jesus-502b17207" target="_blank"
       class="group flex items-center gap-2 bg-gray-700 text-gray-300 border border-gray-600 rounded-full px-6 py-3 shadow-lg hover:bg-blue-800 hover:text-white transition transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-400">
      LinkedIn
    </a>

    <a href="#contact"
       class="group flex items-center gap-2 bg-gray-700 text-gray-300 rounded-full px-6 py-3 shadow-lg hover:bg-green-500 hover:text-white transition transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-400">
      Email Me
    </a>

    <a href="#projects"
       class="group flex items-center gap-2 bg-gray-700 text-gray-300 border border-gray-600 rounded-full px-6 py-3 shadow-lg hover:bg-purple-500 hover:text-white transition transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-400">
      View Projects
    </a>
  </div>

  <!-- Scroll hint -->
  <div class="absolute bottom-8 animate-bounce text-gray-400">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 9l-7 7-7-7"/>
    </svg>
  </div>
</section>
